appId: com.accountant24.desktop
productName: Accountant24
# asar disabled on purpose: the agent runs as a child Node process (Electron-as-
# Node) that resolves pi + loads native deps from node_modules; keeping the tree
# on real disk avoids the asar/asar.unpacked path + native-module pitfalls.
asar: false

directories:
  buildResources: build
  output: release

# Versionless artifact name so /releases/latest/download/Accountant24.dmg is a
# stable direct-download URL (the version lives in the release tag and the app's
# Info.plist). Revisit if an x64 build is ever re-added — both arches would then
# need distinct names to not collide in one GitHub Release.
artifactName: ${productName}.${ext}

# CI publishes the release artifacts via `electron-builder --publish always`,
# which uploads to the GitHub Release for the current tag.
publish:
  provider: github
  owner: machulav
  repo: accountant24
  # No auto-update (electron-updater) in the app, so skip uploading latest-mac.yml.
  # Also avoids the classic race: both arch matrix jobs would otherwise upload the
  # SAME-named latest-mac.yml to one release and can 422 each other.
  publishAutoUpdate: false

# out/ (electron-vite build) + the app manifest. electron-builder also bundles
# the production dependencies (pi SDK, react, …) automatically.
files:
  - out/**/*
  - package.json
  - "!**/*.{map,md}"

# Vendored, on-disk resources the agent child reads via env (PATH / TESSDATA_PREFIX)
# and `pi -e`. Land under Contents/Resources/ → matches env.ts resourceDir().
extraResources:
  - from: resources/bin
    to: bin
  - from: resources/tessdata
    to: tessdata
  - from: resources/accountant24-extension.js
    to: accountant24-extension.js
  # Third-party license notice for the bundled GPL/permissive CLI tools
  # (generated by scripts/vendor-bin.ts).
  - from: resources/THIRD-PARTY-LICENSES.txt
    to: THIRD-PARTY-LICENSES.txt

mac:
  # arm64 only: the arch list here overrides CLI --arm64/--x64 flags, and the
  # vendored CLI tools (resources/bin) are built for the host arch — an x64 app
  # with arm64 tools inside would not work on Intel. See release.yml for why
  # Intel builds are dropped and what re-adding them would take.
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  category: public.app-category.finance
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Developer-ID signing + notarization run in CI only, driven by env:
  # CSC_LINK / CSC_KEY_PASSWORD select the cert, and APPLE_API_KEY /
  # APPLE_API_KEY_ID / APPLE_API_ISSUER feed notarytool (see release.yml).
  # Local builds have none of these set → ad-hoc signed, notarization skipped.
  notarize: true

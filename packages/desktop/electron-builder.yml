appId: com.accountant24.desktop
productName: Accountant24
# asar disabled on purpose: the agent runs as a child Node process (Electron-as-
# Node) that resolves pi + loads native deps from node_modules; keeping the tree
# on real disk avoids the asar/asar.unpacked path + native-module pitfalls.
asar: false

directories:
  buildResources: build
  output: release

# Per-arch artifact names so the arm64 and x64 dmgs/zips don't collide when both
# matrix jobs upload to the same GitHub Release.
artifactName: ${productName}-${version}-${arch}.${ext}

# CI publishes the release artifacts via `electron-builder --publish always`,
# which uploads to the GitHub Release for the current tag.
publish:
  provider: github
  owner: machulav
  repo: accountant24
  # No auto-update (electron-updater) in the app, so skip uploading latest-mac.yml.
  # Also avoids the classic race: both arch matrix jobs would otherwise upload the
  # SAME-named latest-mac.yml to one release and can 422 each other.
  publishAutoUpdate: false

# out/ (electron-vite build) + the app manifest. electron-builder also bundles
# the production dependencies (pi SDK, react, …) automatically.
files:
  - out/**/*
  - package.json
  - "!**/*.{map,md}"

# Vendored, on-disk resources the agent child reads via env (PATH / TESSDATA_PREFIX)
# and `pi -e`. Land under Contents/Resources/ → matches env.ts resourceDir().
extraResources:
  - from: resources/bin
    to: bin
  - from: resources/tessdata
    to: tessdata
  - from: resources/accountant24-extension.js
    to: accountant24-extension.js
  # Third-party license notice for the bundled GPL/permissive CLI tools
  # (generated by scripts/vendor-bin.ts).
  - from: resources/THIRD-PARTY-LICENSES.txt
    to: THIRD-PARTY-LICENSES.txt

mac:
  # Each CI runner builds its own architecture (arm64 on macos-14, x64 on
  # macos-13) and passes --arm64 / --x64, so only the matching arch is produced
  # per job; listing both here lets a local `electron-builder --mac` do both.
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.finance
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Unsigned for now: CI sets CSC_IDENTITY_AUTO_DISCOVERY=false, so electron-builder
  # skips Developer-ID signing and ad-hoc signs the app (needed for arm64 to launch).
  # Notarization is a follow-up: add APPLE_* / API-key env + `notarize: true` here.

# Releases the desktop app. Dispatch-only: run it from the Actions tab, or via
# `npm run release` / `npm run release:rc` (thin `gh workflow run` wrappers).
#
# type:
#   stable  — cut a new release: scripts/release.ts bumps the version, writes
#             the CHANGELOG.md section, commits, tags, and pushes
#   rc      — same, but bumps to the next X.Y.Z-rc.N and skips CHANGELOG.md;
#             published as a prerelease
#   rebuild — re-run build+publish for an existing tag (requires the `tag`
#             input); use to retry a failed build/notarization without
#             cutting a new version
#
# Cutting the tag and building happen in ONE run, chained with `needs:` — a
# tag pushed with GITHUB_TOKEN never triggers other workflows (GitHub's
# recursion protection), so a separate tag-triggered build workflow would
# silently never run. Flow: checks (quality gate `npm run verify`) →
# create-release (cut tag if needed + draft release with notes) → build
# (sign + notarize, upload dmg/zip) → verify (Gatekeeper checks on the
# uploaded dmg from a clean machine) → finalize (un-draft).
#
# Intel (x64) builds are dropped for now: GitHub retired the macos-13 runners
# (late 2025), and Homebrew ships x64 bottles only for macOS 14 — on the
# remaining free Intel runner (macos-15-intel) `brew install hledger` would
# build GHC from source for hours. To bring x64 back, either vendor the CLI
# tools without Homebrew or build on an arm64 runner with an x86_64 Homebrew
# under Rosetta, then re-add a matrix entry with arch: x64.
#
# Builds are Developer-ID signed and notarized. Required repo secrets:
#   CSC_LINK / CSC_KEY_PASSWORD          — base64 .p12 with the Developer ID
#                                          Application cert + private key
#   APPLE_API_KEY_P8 / APPLE_API_KEY_ID /
#   APPLE_API_ISSUER                     — App Store Connect API key (.p8
#                                          contents / key ID / issuer ID) for
#                                          notarytool (electron-builder wants
#                                          APPLE_API_KEY as a file path, so the
#                                          .p8 is written to runner.temp first)

name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Release type"
        type: choice
        options: [stable, rc, rebuild]
        default: stable
      tag:
        description: "Existing tag to rebuild (only for type: rebuild, e.g. v0.2.2-rc.1)"
        required: false

permissions:
  contents: write

# A release run mutates main (version bump commit) and the tag namespace —
# never let two run at once.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Quality gate before anything is mutated: audit, format/lint, types, tests
  # with coverage (npm run verify). Failing here leaves no tag, no bump commit,
  # no draft release behind. Skipped for rebuilds — the tag's code already
  # passed when it was cut.
  #
  # Input validation costs no extra job: each path fail-fasts in the first
  # step of the first job that runs for it — stable/rc here, rebuild in
  # create-release (this job is skipped there).
  checks:
    if: inputs.type != 'rebuild'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate inputs
        if: inputs.tag != ''
        run: |
          echo "::error::The tag input is only for type=rebuild (a ${{ inputs.type }} release computes its own tag)."
          exit 1

      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # The suite includes integration tests that run the real tools the app
      # ships (hledger for briefings, pdftotext/tesseract for extraction) and
      # a real `git commit` (scaffold) — install the tools and give the runner
      # a git identity, or 13 tests fail with empty results.
      - name: Install CLI tools used by integration tests
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends hledger poppler-utils tesseract-ocr
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: npm ci

      - run: npm run verify

  create-release:
    needs: checks
    # Run when checks succeeded OR was skipped (rebuild); never after a failure.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Validate inputs
        if: inputs.type == 'rebuild' && inputs.tag == ''
        run: |
          echo "::error::type=rebuild requires the tag input (e.g. v0.2.2-rc.1)."
          exit 1

      # --- cut a new version (stable/rc only) --------------------------------
      # Full history + tags: changelogen derives the semver bump and the notes
      # from the commits since the last stable tag.
      - uses: actions/checkout@v5
        if: inputs.type != 'rebuild'
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v5
        if: inputs.type != 'rebuild'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: inputs.type != 'rebuild'

      - name: Bump version + changelog, tag, push
        id: cut
        if: inputs.type != 'rebuild'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npx tsx scripts/release.ts ${{ inputs.type == 'rc' && '--rc' || '' }}
        # release.ts appends tag=vX.Y.Z to GITHUB_OUTPUT after pushing.

      # -----------------------------------------------------------------------
      - id: meta
        env:
          CUT_TAG: ${{ steps.cut.outputs.tag }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${CUT_TAG:-$INPUT_TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.tag }} # tag commit has the new CHANGELOG.md section

      - name: Create draft release with notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it."
            exit 0
          fi
          if [[ "$TAG" == *-rc.* ]]; then
            # rc tags have no CHANGELOG.md section (the final release writes it);
            # mark as prerelease so it never becomes "latest".
            gh release create "$TAG" --draft --prerelease --title "$TAG" \
              --notes "Release candidate for testing."
          else
            # Notes = the topmost (latest) section of CHANGELOG.md, written by
            # `changelogen --release`, minus its heading line.
            NOTES="$(awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md | tail -n +2)"
            gh release create "$TAG" --draft --title "$TAG" --notes "$NOTES"
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14 # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    # A healthy build takes ~15 min plus Apple's notarization wait (usually
    # 2-10 min, occasionally longer); anything past this is a hang (e.g. a tool
    # waiting for interactive input), not a slow build.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fail fast on type errors before the slow brew/vendor + package steps
      # (electron-vite's build does no type-checking).
      - run: npm run typecheck

      - name: Vendor CLI tools (hledger, pdftotext, tesseract)
        run: npx tsx scripts/vendor-bin.ts

      - name: Build renderer + main + extension bundle
        run: npm run build

      # Fail loudly (instead of shipping an unsigned build or dying with a
      # cryptic electron-builder error) if the signing secrets are missing.
      # electron-builder/notarytool need APPLE_API_KEY as a path to the .p8,
      # so materialize the secret into a file outside the workspace.
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for s in APPLE_API_KEY_P8 CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!s}" ]; then
              echo "::error::Repo secret $s is not set (see the signing/notarization comment at the top of this workflow)."
              exit 1
            fi
          done
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/apple_api_key.p8"

      - name: Package + publish (${{ matrix.arch }})
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID Application cert; electron-builder imports it into a
          # temporary keychain and signs with it.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization credentials (App Store Connect API key).
          APPLE_API_KEY: ${{ runner.temp }}/apple_api_key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          npx electron-builder --mac --${{ matrix.arch }} \
            -c.extraMetadata.version="${{ needs.create-release.outputs.version }}" \
            --publish always

  # Validates the UPLOADED dmg from a clean machine — exactly what a user
  # downloads — before the release goes public.
  verify:
    needs: [create-release, build]
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Download dmg from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: gh release download "$TAG" --pattern '*-arm64.dmg' --output app.dmg

      - name: Gatekeeper checks (codesign, spctl, stapler, version)
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          MOUNT="$RUNNER_TEMP/dmg"
          hdiutil attach app.dmg -mountpoint "$MOUNT" -nobrowse -readonly
          trap 'hdiutil detach "$MOUNT" -quiet || true' EXIT
          APP="$MOUNT/Accountant24.app"

          codesign --verify --deep --strict --verbose=2 "$APP"

          SPCTL_OUT=$(spctl -a -vv "$APP" 2>&1) || { echo "$SPCTL_OUT"; exit 1; }
          echo "$SPCTL_OUT"
          echo "$SPCTL_OUT" | grep -q "Notarized Developer ID" || {
            echo "::error::Gatekeeper did not report 'Notarized Developer ID'."
            exit 1
          }

          xcrun stapler validate "$APP"

          ACTUAL=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "::error::Version mismatch: app reports $ACTUAL, release is $VERSION."
            exit 1
          fi
          echo "OK: signed, notarized, stapled, version $ACTUAL."

  finalize:
    needs: [create-release, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false

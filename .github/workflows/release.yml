# Builds the desktop app on release and attaches the macOS dmgs/zips to the
# GitHub Release. Triggered by the tag that `npm run release` pushes (which also
# opens the draft release with notes), or manually via workflow_dispatch against
# an existing tag (for test runs).
#
# Flow: ensure a draft release exists → build arm64 (macos-14), uploading via
# `electron-builder --publish always` → un-draft.
#
# Intel (x64) builds are dropped for now: GitHub retired the macos-13 runners
# (late 2025), and Homebrew ships x64 bottles only for macOS 14 — on the
# remaining free Intel runner (macos-15-intel) `brew install hledger` would
# build GHC from source for hours. To bring x64 back, either vendor the CLI
# tools without Homebrew or build on an arm64 runner with an x86_64 Homebrew
# under Rosetta, then re-add a matrix entry with arch: x64.
#
# Builds are Developer-ID signed and notarized. Required repo secrets:
#   CSC_LINK / CSC_KEY_PASSWORD          — base64 .p12 with the Developer ID
#                                          Application cert + private key
#   APPLE_API_KEY_P8 / APPLE_API_KEY_ID /
#   APPLE_API_ISSUER                     — App Store Connect API key (.p8
#                                          contents / key ID / issuer ID) for
#                                          notarytool (electron-builder wants
#                                          APPLE_API_KEY as a file path, so the
#                                          .p8 is written to runner.temp first)

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.2-rc.1)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }} # tag commit has the new CHANGELOG.md section

      - name: Create draft release with notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it."
            exit 0
          fi
          if [[ "$TAG" == *-rc.* ]]; then
            # rc tags have no CHANGELOG.md section (the final release writes it);
            # mark as prerelease so it never becomes "latest".
            gh release create "$TAG" --draft --prerelease --title "$TAG" \
              --notes "Release candidate for testing."
          else
            # Notes = the topmost (latest) section of CHANGELOG.md, written by
            # `changelogen --release`, minus its heading line.
            NOTES="$(awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md | tail -n +2)"
            gh release create "$TAG" --draft --title "$TAG" --notes "$NOTES"
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14 # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    # A healthy build takes ~15 min plus Apple's notarization wait (usually
    # 2-10 min, occasionally longer); anything past this is a hang (e.g. a tool
    # waiting for interactive input), not a slow build.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fail fast on type errors before the slow brew/vendor + package steps
      # (electron-vite's build does no type-checking).
      - run: npm run typecheck

      - name: Vendor CLI tools (hledger, pdftotext, tesseract)
        run: npx tsx scripts/vendor-bin.ts

      - name: Build renderer + main + extension bundle
        run: npm run build

      # Fail loudly (instead of shipping an unsigned build or dying with a
      # cryptic electron-builder error) if the signing secrets are missing.
      # electron-builder/notarytool need APPLE_API_KEY as a path to the .p8,
      # so materialize the secret into a file outside the workspace.
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for s in APPLE_API_KEY_P8 CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!s}" ]; then
              echo "::error::Repo secret $s is not set (see the signing/notarization comment at the top of this workflow)."
              exit 1
            fi
          done
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/apple_api_key.p8"

      - name: Package + publish (${{ matrix.arch }})
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID Application cert; electron-builder imports it into a
          # temporary keychain and signs with it.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization credentials (App Store Connect API key).
          APPLE_API_KEY: ${{ runner.temp }}/apple_api_key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          npx electron-builder --mac --${{ matrix.arch }} \
            -c.extraMetadata.version="${{ needs.create-release.outputs.version }}" \
            --publish always

  finalize:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
